version: '3.8'

services:
  backend:
    image: saazhoonmain/cloudpulse-python:latest
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  worker:
    image: saazhoonmain/cloudpulse-python:latest
    command: celery -A worker.celery_worker.celery_app worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  frontend:
    image: saazhoonmain/cloudpulse-frontend:latest
    ports:
      - "3000:3000"
    depends_on:
      - backend

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
