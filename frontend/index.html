<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudPulse Dashboard</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --primary: #bb86fc;
            --surface: #1e1e1e;
            --border: #333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: var(--primary); }
        .container {
            width: 100%;
            max-width: 650px;
            background-color: var(--surface);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .form-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        input[type="text"] {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: #2c2c2c;
            color: white;
            font-size: 1rem;
        }
        button {
            padding: 0.75rem 1.5rem;
            background-color: var(--primary);
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #9965f4; }
        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .task-item {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .task-item:last-child { border-bottom: none; }
        .status-pending { color: #ffb74d; }
        .status-done { color: #81c784; }
        .payload { font-weight: 500; margin-bottom: 0.25rem; }
        .meta { font-size: 0.85rem; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>CloudPulse</h1>
        <form id="task-form" class="form-group">
            <input type="text" id="payload-input" placeholder="Enter task payload to process..." required>
            <button type="submit">Submit Task</button>
        </form>
        
        <h2>Recent Tasks</h2>
        <ul class="task-list" id="task-list">
            <li class="task-item">Loading tasks...</li>
        </ul>
    </div>
    <script src="app.js"></script>
</body>
</html>
